name: Finalize repair branch

on:
  push:
    branches:
      - agent/recent-feature-fixes
    paths:
      - .github/workflows/finalize-repair-branch.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/recent-feature-fixes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Apply robust follow-up patches
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          import traceback

          report = []
          errors = []

          def patch(path, pattern, replacement, label, flags=0):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  errors.append(f"{label}: expected one match, found {count}")
                  report.append(f"FAIL {label}")
                  return
              file.write_text(updated, encoding="utf-8")
              report.append(f"PASS {label}")

          try:
              manager = Path("app/model_manager.py")
              text = manager.read_text(encoding="utf-8")
              if "def _resolve_draft_model_path" not in text:
                  marker = "    def _build_engine(\n"
                  helper = '''    def _resolve_draft_model_path(
              self, model_id: str, draft_model: str | None
          ) -> str | None:
              if not draft_model:
                  return None
              if draft_model == model_id:
                  raise ValueError("Draft model must differ from the target model.")

              draft_cfg = self.catalog.get(draft_model)
              if draft_cfg is not None:
                  if "embedding" in draft_cfg.backend.lower():
                      raise ValueError(
                          f"Draft model '{draft_model}' is an embedding model; "
                          "speculative decoding requires a text-generation model."
                      )
                  if not self.force_mock and not registry.is_downloaded(draft_cfg, BASE_DIR):
                      raise ValueError(
                          f"Draft model '{draft_model}' is not converted locally."
                      )
                  return str(draft_cfg.abs_path(BASE_DIR))

              path = Path(draft_model).expanduser()
              path = path.resolve() if path.is_absolute() else (BASE_DIR / path).resolve()
              if not path.is_dir():
                  raise ValueError(
                      f"Draft model path does not exist or is not a directory: {path}"
                  )
              if not self.force_mock and not registry.is_openvino_model_dir(path):
                  raise ValueError(
                      f"Draft model path is not a converted OpenVINO model: {path}"
                  )
              return str(path)

          '''
                  if marker not in text:
                      errors.append("insert draft validator: build-engine marker missing")
                      report.append("FAIL insert draft validator")
                  else:
                      manager.write_text(text.replace(marker, helper + marker, 1), encoding="utf-8")
                      report.append("PASS insert draft validator")
              else:
                  report.append("SKIP insert draft validator")

              patch(
                  "app/model_manager.py",
                  r"    async def _load_task\(self, model_id: str, device: str, draft_model: str \| None = None\) -> None:\n",
                  "    async def _load_task(\n        self, model_id: str, device: str, draft_model_path: str | None = None\n    ) -> None:\n",
                  "load task accepts validated draft path",
              )
              patch(
                  "app/model_manager.py",
                  r"                        draft_model_path = None\n                        if draft_model:\n(?:.*\n){3}                            else:\n                                draft_model_path = draft_model\n\n",
                  "",
                  "remove unvalidated draft resolution",
              )
              patch(
                  "app/model_manager.py",
                  r"        task = asyncio\.create_task\(self\._load_task\(model_id, device, draft_model=draft_model\)\)\n",
                  "        task = asyncio.create_task(\n            self._load_task(model_id, device, draft_model_path=draft_model_path)\n        )\n",
                  "pass validated draft path",
              )

              patch(
                  "runtime/openvino_engine.py",
                  r'''            draft_model_fn = getattr\(ov_genai, "draft_model", None\)\n.*?\n\n        logger\.info\("Loading''',
                  '''            draft_model_fn = getattr(ov_genai, "draft_model", None)
              if draft_model_fn is None:
                  raise RuntimeError(
                      "This OpenVINO GenAI version does not support speculative decoding."
                  )
              try:
                  draft_obj = draft_model_fn(str(draft_model_path), self.device)
              except Exception as exc:
                  raise RuntimeError(
                      f"Failed to load draft model '{draft_model_path}': {exc}"
                  ) from exc

          logger.info("Loading''',
                  "fail loudly when speculative decoding cannot initialize",
                  re.DOTALL,
              )
              patch(
                  "runtime/openvino_engine.py",
                  r'''        if Adapter is not None and AdapterConfig is not None:\n.*?        return None\n\n    def generate''',
                  '''        if Adapter is None or AdapterConfig is None:
              raise RuntimeError(
                  "This OpenVINO GenAI version does not support dynamic LoRA adapters."
              )
              try:
                  adapters_config = AdapterConfig()
                  adapters_config.add(
                      Adapter(str(params.lora_path)), alpha=float(params.lora_alpha or 1.0)
                  )
                  return adapters_config
              except Exception as exc:
                  raise RuntimeError(
                      f"Failed to construct LoRA adapter config for '{params.lora_path}': {exc}"
                  ) from exc

          def generate''',
                  "fail loudly when LoRA cannot initialize",
                  re.DOTALL,
              )
              patch(
                  "app/server.py",
                  r'                raise HTTPException\(status_code=502, detail=f"Hugging Face API unreachable: \{exc\}"\)\n',
                  '                raise HTTPException(\n                    status_code=502, detail=f"Hugging Face API unreachable: {exc}"\n                ) from exc\n',
                  "chain Hugging Face search exception",
              )
              patch(
                  "app/server.py",
                  r"        task = manager\.schedule_convert\(\n            req\.model_id,\n",
                  "        manager.schedule_convert(\n            req.model_id,\n",
                  "remove unused conversion task variable",
              )
              patch(
                  "app/telemetry.py",
                  r"        from runtime\.device_check import get_core, available_devices\n",
                  "        from runtime.device_check import available_devices, get_core\n",
                  "sort telemetry local import",
              )
          except Exception:
              errors.append(traceback.format_exc())

          Path("repair-followup-report.txt").write_text(
              "\n".join(report + (["", "Errors:"] + errors if errors else [])) + "\n",
              encoding="utf-8",
          )
          print(Path("repair-followup-report.txt").read_text(encoding="utf-8"))
          PY

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Format, lint, and test
        shell: bash
        env:
          OV_LLM_MOCK: "true"
        run: |
          set +e
          ruff check . --fix > lint-fix-output.txt 2>&1
          RUFF_FIX_EXIT=$?
          ruff format . > format-output.txt 2>&1
          FORMAT_EXIT=$?
          ruff check . > lint-output.txt 2>&1
          LINT_EXIT=$?
          ruff format --check . >> format-output.txt 2>&1
          FORMAT_CHECK_EXIT=$?
          pytest > test-output.txt 2>&1
          TEST_EXIT=$?
          {
            echo "# Recent feature repair validation"
            echo
            echo "- Ruff fix exit: $RUFF_FIX_EXIT"
            echo "- Format exit: $FORMAT_EXIT"
            echo "- Format check exit: $FORMAT_CHECK_EXIT"
            echo "- Lint exit: $LINT_EXIT"
            echo "- Test exit: $TEST_EXIT"
            echo
            echo "## Follow-up patch report"
            echo '```text'
            cat repair-followup-report.txt
            echo '```'
            echo
            echo "## Lint output"
            echo '```text'
            cat lint-output.txt
            echo '```'
            echo
            echo "## Test output"
            echo '```text'
            tail -n 350 test-output.txt
            echo '```'
          } > repair-validation-report.md
          echo "$TEST_EXIT" > .repair-test-exit
          exit 0

      - name: Publish finalized branch
        shell: bash
        run: |
          TEST_EXIT=$(cat .repair-test-exit)
          rm -f .repair-test-exit lint-fix-output.txt lint-output.txt format-output.txt test-output.txt repair-apply-report.txt repair-followup-report.txt install-output.txt
          git rm -f .github/workflows/finalize-repair-branch.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Finalize recent OpenVINO feature fixes"
          git push origin HEAD:agent/recent-feature-fixes
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "Tests failed; see repair-validation-report.md"
          fi

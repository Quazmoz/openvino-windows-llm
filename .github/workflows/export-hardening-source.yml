name: Export hardening source

on:
  push:
    branches: ["agent/harden-multimodal-production"]

permissions:
  contents: read

jobs:
  export:
    if: ${{ !contains(github.event.head_commit.message, '[skip export]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: hardening-source
          path: .
          include-hidden-files: true
          retention-days: 1

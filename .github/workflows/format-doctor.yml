name: Format System Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format-doctor:
    if: github.head_ref == 'agent/doctor-diagnostics'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Apply canonical formatting
        run: |
          ruff check --fix app/config.py app/doctor_ui.py tests/test_doctor_ui.py
          ruff format app/config.py app/doctor_ui.py tests/test_doctor_ui.py

      - name: Push formatter result
        run: |
          if git diff --quiet; then
            echo "Files already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/config.py app/doctor_ui.py tests/test_doctor_ui.py
          git commit -m "Format System Doctor files"
          git push origin HEAD:${{ github.head_ref }}

name: Format System Doctor

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format-doctor:
    if: github.head_ref == 'agent/doctor-diagnostics'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Apply canonical feature formatting
        run: |
          ruff check --fix app/config.py app/doctor_ui.py tests/test_doctor_ui.py
          ruff format app/config.py app/doctor_ui.py tests/test_doctor_ui.py

      - name: Capture repository-wide Ruff output
        run: |
          {
            echo "## ruff check ."
            ruff check . || true
            echo
            echo "## ruff format --check ."
            ruff format --check . || true
          } > ruff-doctor-report.txt 2>&1

      - name: Push formatter result and report
        run: |
          if git diff --quiet && git status --short | grep -qv '^?? ruff-doctor-report.txt$'; then
            echo "No changes to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/config.py app/doctor_ui.py tests/test_doctor_ui.py ruff-doctor-report.txt
          if git diff --cached --quiet; then
            echo "Report is unchanged."
            exit 0
          fi
          git commit -m "Capture Ruff diagnostics"
          git push origin HEAD:${{ github.head_ref }}

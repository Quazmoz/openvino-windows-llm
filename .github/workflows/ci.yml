name: CI

on:
  push:
    branches: [ main, "dev/*" ]
  pull_request:
    branches: [ main, "dev/*" ]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install using editable/dev mode so that imports resolve correctly
          pip install -e .[dev]

      - name: Run Ruff Lint/Format Checks
        run: |
          ruff check .
          ruff format --check .

      - name: Run pytest (mock mode)
        env:
          OV_LLM_MOCK: "true"
        run: |
          pytest

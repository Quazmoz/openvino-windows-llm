name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  focused-ruff-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install ruff
      - name: Show focused lint and format output
        run: |
          ruff check app/config.py app/model_load_target.py tests/test_model_load_target.py
          ruff format --check --diff app/config.py app/model_load_target.py tests/test_model_load_target.py

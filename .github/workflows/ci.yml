name: CI

on:
  push:
    branches: [main, "dev/*"]
  pull_request:
    branches: [main, "dev/*"]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff lint and format checks
        run: |
          set +e
          ruff check . > ruff-check.txt 2>&1
          check_status=$?
          ruff format --check --diff . > ruff-format.diff 2>&1
          format_status=$?
          cat ruff-check.txt
          cat ruff-format.diff
          if [ "$check_status" -ne 0 ] || [ "$format_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics-${{ matrix.python-version }}
          path: |
            ruff-check.txt
            ruff-format.diff
          if-no-files-found: ignore
          retention-days: 1

      - name: Run pytest in mock mode
        env:
          OV_LLM_MOCK: "true"
        run: pytest

  external-contract-smoke:
    name: External API Contract Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Start mock server
        env:
          OV_LLM_MOCK: "true"
        run: |
          python -m app.server \
            --mock \
            --host 127.0.0.1 \
            --port 8123 \
            --model tinyllama-1.1b-chat-fp16 \
            > contract-server.log 2>&1 &
          echo $! > contract-server.pid

      - name: Validate external OpenAI and integration contracts
        run: |
          python scripts/validate_api_contract.py \
            --base-url http://127.0.0.1:8123 \
            --profile full \
            --model tinyllama-1.1b-chat-fp16 \
            --device CPU \
            --expect-mock \
            --include-embeddings \
            --run-benchmark \
            --exercise-lifecycle \
            --load-timeout 60 \
            --timeout 30 \
            --output-json contract-report.json \
            --output-markdown contract-report.md

      - name: Show server log on failure
        if: failure()
        run: tail -200 contract-server.log

      - name: Stop mock server
        if: always()
        run: |
          if [ -f contract-server.pid ]; then
            kill "$(cat contract-server.pid)" 2>/dev/null || true
          fi

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-api-contract-report
          path: |
            contract-report.json
            contract-report.md
          if-no-files-found: ignore
          retention-days: 14

  windows-harness-smoke:
    name: Windows Harness Syntax
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse PowerShell certification harness
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/validate_windows.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Compile Python contract validator
        run: python -m py_compile scripts/validate_api_contract.py

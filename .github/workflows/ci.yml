name: CI

on:
  push:
    branches: [main, "dev/*"]
  pull_request:
    branches: [main, "dev/*"]

permissions:
  contents: write

jobs:
  publish-edge-fix:
    name: Publish reviewed edge fix
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply assertion-guarded source changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one match in {path}, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "app/ui_extension.py",
              """    function requestPath(input) {
                  const value = typeof input === 'string' ? input : input?.url || '';
                  try { return new URL(value, window.location.href).pathname; }
                  catch { return value; }
              }
          """,
              """    function requestEndpoint(input) {
                  const value = typeof input === 'string'
                      ? input
                      : input instanceof URL
                          ? input.href
                          : input?.url || '';
                  try {
                      const url = new URL(value, window.location.href);
                      return {
                          path: url.pathname,
                          sameOrigin: url.origin === window.location.origin,
                      };
                  } catch {
                      return { path: '', sameOrigin: false };
                  }
              }
          """,
          )
          replace_once(
              "app/ui_extension.py",
              "        const path = requestPath(input);\n",
              "        const endpoint = requestEndpoint(input);\n        const path = endpoint.path;\n        const isSameOrigin = endpoint.sameOrigin;\n",
          )
          replace_once(
              "app/ui_extension.py",
              "        if (path === '/v1/models/download-custom' && method === 'POST' && customModelForm) {\n",
              "        if (isSameOrigin && path === '/v1/models/download-custom' && method === 'POST' && customModelForm) {\n",
          )
          replace_once(
              "app/ui_extension.py",
              "        if (path === '/v1/chat/completions' && method === 'POST' && pendingImages.length) {\n",
              "        if (isSameOrigin && path === '/v1/chat/completions' && method === 'POST' && pendingImages.length) {\n",
          )
          replace_once(
              "app/ui_extension.py",
              "            catch { return originalFetch(input, init); }\n",
              """            catch {
                          toast('Could not attach images to this request; attachments were kept.');
                          return responseWithJson(
                              { detail: 'Could not attach images to the request body.' },
                              new Response('', { status: 400 }),
                          );
                      }
          """,
          )
          replace_once(
              "app/ui_extension.py",
              "            if (userMessage) {\n",
              """            if (!userMessage) {
                          toast('Images require a user message; attachments were kept.');
                          return responseWithJson(
                              { detail: 'Images require a user message.' },
                              new Response('', { status: 400 }),
                          );
                      }
                      if (userMessage) {
          """,
          )
          replace_once(
              "app/ui_extension.py",
              "        if (path === '/v1/system/status' && response.ok) {\n",
              "        if (isSameOrigin && path === '/v1/system/status' && response.ok) {\n",
          )
          replace_once(
              "tests/test_ui_extension.py",
              "    assert \".slice(-4096)\" in VISION_EXTENSION_JS\n",
              """    assert ".slice(-4096)" in VISION_EXTENSION_JS
              assert "url.origin === window.location.origin" in VISION_EXTENSION_JS
              assert "input instanceof URL" in VISION_EXTENSION_JS
              assert "Could not attach images to this request" in VISION_EXTENSION_JS
              assert "Images require a user message" in VISION_EXTENSION_JS
              assert "catch { return originalFetch(input, init); }" not in VISION_EXTENSION_JS
          """,
          )
          PY

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate source changes
        env:
          OV_LLM_MOCK: "true"
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          pytest
          python -m compileall -q app runtime scripts tests
          python - <<'PY'
          from pathlib import Path
          from app.ui_extension import VISION_EXTENSION_JS
          Path('/tmp/vision-extension.js').write_text(VISION_EXTENSION_JS, encoding='utf-8')
          PY
          node --check /tmp/vision-extension.js
          git diff --check

      - name: Commit verified source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/ui_extension.py tests/test_ui_extension.py
          git commit -m "Close final multimodal browser edge cases"
          git push origin HEAD:${{ github.head_ref }}

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff lint and format checks
        run: |
          ruff check .
          ruff format --check .

      - name: Run pytest in mock mode
        env:
          OV_LLM_MOCK: "true"
        run: pytest

  external-contract-smoke:
    name: External API Contract Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Start mock server
        env:
          OV_LLM_MOCK: "true"
        run: |
          python -m app.server \
            --mock \
            --host 127.0.0.1 \
            --port 8123 \
            --model tinyllama-1.1b-chat-fp16 \
            > contract-server.log 2>&1 &
          echo $! > contract-server.pid

      - name: Validate external OpenAI and integration contracts
        run: |
          python scripts/validate_api_contract.py \
            --base-url http://127.0.0.1:8123 \
            --profile full \
            --model tinyllama-1.1b-chat-fp16 \
            --device CPU \
            --expect-mock \
            --include-embeddings \
            --run-benchmark \
            --exercise-lifecycle \
            --load-timeout 60 \
            --timeout 30 \
            --output-json contract-report.json \
            --output-markdown contract-report.md

      - name: Show server log on failure
        if: failure()
        run: tail -200 contract-server.log

      - name: Stop mock server
        if: always()
        run: |
          if [ -f contract-server.pid ]; then
            kill "$(cat contract-server.pid)" 2>/dev/null || true
          fi

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-api-contract-report
          path: |
            contract-report.json
            contract-report.md
          if-no-files-found: ignore
          retention-days: 14

  windows-harness-smoke:
    name: Windows Harness Syntax
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse PowerShell certification harness
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/validate_windows.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Compile Python contract validator
        run: python -m py_compile scripts/validate_api_contract.py

name: CI

on:
  push:
    branches: [main, "dev/*"]
  pull_request:
    branches: [main, "dev/*"]

permissions:
  contents: write

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Apply Ruff fixes and formatting
        run: |
          ruff check --fix .
          ruff format .
          ruff check .
          ruff format --check .

      - name: Commit formatter output to feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/multimodal.py runtime/openvino_engine.py scripts/validate_api_contract.py tests/test_multimodal.py tests/test_web_ui_ux.py
          if git diff --cached --quiet; then
            echo "No formatter changes to commit."
          else
            git commit -m "Apply Ruff formatting"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Run pytest in mock mode
        env:
          OV_LLM_MOCK: "true"
        run: pytest

  external-contract-smoke:
    name: External API Contract Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Start mock server
        env:
          OV_LLM_MOCK: "true"
        run: |
          python -m app.server \
            --mock \
            --host 127.0.0.1 \
            --port 8123 \
            --model tinyllama-1.1b-chat-fp16 \
            > contract-server.log 2>&1 &
          echo $! > contract-server.pid

      - name: Validate external OpenAI and integration contracts
        run: |
          python scripts/validate_api_contract.py \
            --base-url http://127.0.0.1:8123 \
            --profile full \
            --model tinyllama-1.1b-chat-fp16 \
            --device CPU \
            --expect-mock \
            --include-embeddings \
            --run-benchmark \
            --exercise-lifecycle \
            --load-timeout 60 \
            --timeout 30 \
            --output-json contract-report.json \
            --output-markdown contract-report.md

      - name: Show server log on failure
        if: failure()
        run: tail -200 contract-server.log

      - name: Stop mock server
        if: always()
        run: |
          if [ -f contract-server.pid ]; then
            kill "$(cat contract-server.pid)" 2>/dev/null || true
          fi

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-api-contract-report
          path: |
            contract-report.json
            contract-report.md
          if-no-files-found: ignore
          retention-days: 14

  windows-harness-smoke:
    name: Windows Harness Syntax
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse PowerShell certification harness
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts/validate_windows.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Compile Python contract validator
        run: python -m py_compile scripts/validate_api_contract.py

name: Apply multimodal hardening

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-test-publish:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/hardening-patch-* | base64 --decode | gzip --decompress > /tmp/hardening.patch
          echo "c60332ffdfa825e39d7ed2bc033983f0d431f34677892b06a2b5250a13f9a185  /tmp/hardening.patch" | sha256sum -c -
          git apply --check /tmp/hardening.patch
          git apply /tmp/hardening.patch

      - name: Restore repository CI and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/hardening-patch-* .github/workflows/export-hardening-source.yml
          test ! -e .github/workflows/export-hardening-source.yml
          test -z "$(find .github -maxdepth 1 -name 'hardening-patch-*' -print -quit)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Python quality gates
        env:
          OV_LLM_MOCK: "true"
        run: |
          ruff check .
          ruff format --check .
          pytest
          python -m compileall -q app runtime tests
          git diff --check

      - name: Validate browser JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          from app.ui_extension import VISION_EXTENSION_JS

          html = Path("web/index.html").read_text(encoding="utf-8")
          matches = list(re.finditer(r'<script(?:\s[^>]*)?>(.*?)</script>', html, re.S))
          if not matches:
              raise SystemExit("No inline browser scripts found")
          for index, match in enumerate(matches, 1):
              Path(f"/tmp/web-inline-{index}.js").write_text(match.group(1), encoding="utf-8")
          Path("/tmp/vision-extension.js").write_text(VISION_EXTENSION_JS, encoding="utf-8")
          PY
          for script in /tmp/web-inline-*.js /tmp/vision-extension.js; do
            node --check "$script"
          done

      - name: Verify final scope
        shell: bash
        run: |
          set -euo pipefail
          cmp -s .github/workflows/ci.yml <(git show origin/main:.github/workflows/ci.yml) || {
            echo "Normal CI workflow was not restored" >&2
            exit 1
          }
          test ! -e .github/workflows/export-hardening-source.yml
          test -z "$(find .github -maxdepth 1 -name 'hardening-patch-*' -print -quit)"
          git status --short

      - name: Commit hardened implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No hardened changes to commit" >&2
            exit 1
          fi
          git commit -m "Harden multimodal vision for production"
          git push origin HEAD:${{ github.head_ref }}

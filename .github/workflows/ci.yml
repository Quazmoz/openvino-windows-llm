name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-device-routing-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Validate changed Python files
        run: |
          ruff check app/config.py app/model_load_target.py tests/test_model_load_target.py
          ruff format --check app/config.py app/model_load_target.py tests/test_model_load_target.py
      - name: Run full mock test suite
        env:
          OV_LLM_MOCK: "true"
        run: pytest

name: Reconcile repair branch history

on:
  push:
    branches: [agent/recent-feature-fixes]
    paths:
      - .github/workflows/reconcile-main-history.yml

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recent-feature-fixes
          fetch-depth: 0
      - name: Record main as merged without changing validated tree
        shell: bash
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/reconcile-main-history.yml
          git commit -m "Remove temporary history reconciliation workflow"
          git merge -s ours origin/main -m "Merge main history into validated repair branch"
          git push origin HEAD:agent/recent-feature-fixes

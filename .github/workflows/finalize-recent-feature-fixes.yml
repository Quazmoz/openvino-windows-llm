name: Finalize recent feature fixes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-recent-feature-fixes.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/recent-feature-fixes
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Apply follow-up fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          manager = Path("app/model_manager.py")
          text = manager.read_text(encoding="utf-8")
          marker = '''    def _build_engine(
              self, model_id: str, device: str, draft_model_path: str | None = None
          ) -> BaseEngine:
          '''
          helper = '''    def _resolve_draft_model_path(
              self, model_id: str, draft_model: str | None
          ) -> str | None:
              if not draft_model:
                  return None
              if draft_model == model_id:
                  raise ValueError("Draft model must differ from the target model.")

              draft_cfg = self.catalog.get(draft_model)
              if draft_cfg is not None:
                  if "embedding" in draft_cfg.backend.lower():
                      raise ValueError(
                          f"Draft model '{draft_model}' is an embedding model; "
                          "speculative decoding requires a text-generation model."
                      )
                  if not self.force_mock and not registry.is_downloaded(draft_cfg, BASE_DIR):
                      raise ValueError(
                          f"Draft model '{draft_model}' is not converted locally."
                      )
                  return str(draft_cfg.abs_path(BASE_DIR))

              path = Path(draft_model).expanduser()
              path = path.resolve() if path.is_absolute() else (BASE_DIR / path).resolve()
              if not path.is_dir():
                  raise ValueError(
                      f"Draft model path does not exist or is not a directory: {path}"
                  )
              if not self.force_mock and not registry.is_openvino_model_dir(path):
                  raise ValueError(
                      f"Draft model path is not a converted OpenVINO model: {path}"
                  )
              return str(path)

          '''
          if "def _resolve_draft_model_path" not in text:
              if marker not in text:
                  raise RuntimeError("Could not locate ModelManager._build_engine")
              manager.write_text(text.replace(marker, helper + marker, 1), encoding="utf-8")

          replace_once(
              "app/model_manager.py",
              "    async def _load_task(self, model_id: str, device: str, draft_model: str | None = None) -> None:\n",
              "    async def _load_task(\n        self, model_id: str, device: str, draft_model_path: str | None = None\n    ) -> None:\n",
          )
          replace_once(
              "app/model_manager.py",
              "                        draft_model_path = None\n                        if draft_model:\n                            if draft_model in self.catalog:\n                                draft_model_path = str(self.catalog[draft_model].abs_path(BASE_DIR))\n                            else:\n                                draft_model_path = draft_model\n\n                        loop = asyncio.get_running_loop()\n",
              "                        loop = asyncio.get_running_loop()\n",
          )
          replace_once(
              "app/model_manager.py",
              "        task = asyncio.create_task(self._load_task(model_id, device, draft_model=draft_model))\n",
              "        task = asyncio.create_task(\n            self._load_task(model_id, device, draft_model_path=draft_model_path)\n        )\n",
          )

          replace_once(
              "runtime/openvino_engine.py",
              '''            draft_model_fn = getattr(ov_genai, "draft_model", None)
              if draft_model_fn is not None:
                  draft_device = self.device
                  if self.device == "NPU":
                      draft_device = "CPU"
                  try:
                      draft_obj = draft_model_fn(str(draft_model_path), draft_device)
                  except Exception as exc:
                      logger.error("Failed to load draft model: %s", exc)
              else:
                  logger.warning(
                      "openvino_genai.draft_model is not available in this OpenVINO version."
                  )
          ''',
              '''            draft_model_fn = getattr(ov_genai, "draft_model", None)
              if draft_model_fn is None:
                  raise RuntimeError(
                      "This OpenVINO GenAI version does not support speculative decoding."
                  )
              try:
                  draft_obj = draft_model_fn(str(draft_model_path), self.device)
              except Exception as exc:
                  raise RuntimeError(
                      f"Failed to load draft model '{draft_model_path}': {exc}"
                  ) from exc
          ''',
          )
          replace_once(
              "runtime/openvino_engine.py",
              '''        if Adapter is not None and AdapterConfig is not None:
              try:
                  adapters_config = AdapterConfig()
                  adapters_config.add(
                      Adapter(str(params.lora_path)), alpha=float(params.lora_alpha or 1.0)
                  )
                  return adapters_config
              except Exception as exc:
                  logger.error("Failed to construct AdapterConfig for %s: %s", params.lora_path, exc)
          return None
          ''',
              '''        if Adapter is None or AdapterConfig is None:
              raise RuntimeError(
                  "This OpenVINO GenAI version does not support dynamic LoRA adapters."
              )
              try:
                  adapters_config = AdapterConfig()
                  adapters_config.add(
                      Adapter(str(params.lora_path)), alpha=float(params.lora_alpha or 1.0)
                  )
                  return adapters_config
              except Exception as exc:
                  raise RuntimeError(
                      f"Failed to construct LoRA adapter config for '{params.lora_path}': {exc}"
                  ) from exc
          ''',
          )
          replace_once(
              "app/server.py",
              '                raise HTTPException(status_code=502, detail=f"Hugging Face API unreachable: {exc}")\n',
              '                raise HTTPException(\n                    status_code=502, detail=f"Hugging Face API unreachable: {exc}"\n                ) from exc\n',
          )
          replace_once(
              "app/server.py",
              "        task = manager.schedule_convert(\n            req.model_id,\n",
              "        manager.schedule_convert(\n            req.model_id,\n",
          )
          replace_once(
              "app/telemetry.py",
              "        from runtime.device_check import get_core, available_devices\n",
              "        from runtime.device_check import available_devices, get_core\n",
          )
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate and write report
        shell: bash
        env:
          OV_LLM_MOCK: "true"
        run: |
          set +e
          ruff check . --fix > lint-fix-output.txt 2>&1
          RUFF_FIX_EXIT=$?
          ruff format . > format-output.txt 2>&1
          FORMAT_EXIT=$?
          ruff check . > lint-output.txt 2>&1
          LINT_EXIT=$?
          ruff format --check . >> format-output.txt 2>&1
          FORMAT_CHECK_EXIT=$?
          pytest > test-output.txt 2>&1
          TEST_EXIT=$?
          {
            echo "# Recent feature repair validation"
            echo
            echo "- Ruff fix exit: $RUFF_FIX_EXIT"
            echo "- Format exit: $FORMAT_EXIT"
            echo "- Format check exit: $FORMAT_CHECK_EXIT"
            echo "- Lint exit: $LINT_EXIT"
            echo "- Test exit: $TEST_EXIT"
            echo
            echo "## Lint output"
            echo '```text'
            cat lint-output.txt
            echo '```'
            echo
            echo "## Test output"
            echo '```text'
            tail -n 300 test-output.txt
            echo '```'
          } > repair-validation-report.md
          echo "TEST_EXIT=$TEST_EXIT" >> "$GITHUB_ENV"
          exit 0

      - name: Update repair branch
        shell: bash
        run: |
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --amend --no-edit
          git push --force origin HEAD:agent/recent-feature-fixes
          if [ "${TEST_EXIT:-1}" -ne 0 ]; then
            echo "Tests failed; see repair-validation-report.md on the branch"
          fi

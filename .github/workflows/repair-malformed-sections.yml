name: Repair malformed feature sections

on:
  push:
    branches:
      - agent/recent-feature-fixes
    paths:
      - .github/workflows/repair-malformed-sections.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/recent-feature-fixes
          fetch-depth: 0

      - name: Restore clean affected files
        run: |
          git fetch origin main
          git checkout origin/main -- app/model_manager.py runtime/openvino_engine.py

      - name: Reapply focused fixes
        shell: bash
        run: |
          set +e
          python <<'PY' > repair-step-output.txt 2>&1
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              print(f"PASS {label}")
              return text.replace(old, new, 1)

          manager_path = Path("app/model_manager.py")
          manager = manager_path.read_text(encoding="utf-8")
          marker = "    def _build_engine(\n"
          helper_lines = [
              "    def _resolve_draft_model_path(",
              "        self, model_id: str, draft_model: str | None",
              "    ) -> str | None:",
              "        if not draft_model:",
              "            return None",
              "        if draft_model == model_id:",
              '            raise ValueError("Draft model must differ from the target model.")',
              "",
              "        draft_cfg = self.catalog.get(draft_model)",
              "        if draft_cfg is not None:",
              '            if "embedding" in draft_cfg.backend.lower():',
              "                raise ValueError(",
              '                    f"Draft model \'{draft_model}\' is an embedding model; "',
              '                    "speculative decoding requires a text-generation model."',
              "                )",
              "            if not self.force_mock and not registry.is_downloaded(",
              "                draft_cfg, BASE_DIR",
              "            ):",
              "                raise ValueError(",
              '                    f"Draft model \'{draft_model}\' is not converted locally."',
              "                )",
              "            return str(draft_cfg.abs_path(BASE_DIR))",
              "",
              "        path = Path(draft_model).expanduser()",
              "        path = (",
              "            path.resolve() if path.is_absolute() else (BASE_DIR / path).resolve()",
              "        )",
              "        if not path.is_dir():",
              "            raise ValueError(",
              '                f"Draft model path does not exist or is not a directory: {path}"',
              "            )",
              "        if not self.force_mock and not registry.is_openvino_model_dir(path):",
              "            raise ValueError(",
              '                f"Draft model path is not a converted OpenVINO model: {path}"',
              "            )",
              "        return str(path)",
              "",
              "",
          ]
          if manager.count(marker) != 1:
              raise RuntimeError("Could not locate ModelManager._build_engine")
          manager = manager.replace(marker, "\n".join(helper_lines) + marker, 1)
          manager = replace_once(
              manager,
              "    async def _load_task(self, model_id: str, device: str, draft_model: str | None = None) -> None:\n",
              "    async def _load_task(\n        self, model_id: str, device: str, draft_model_path: str | None = None\n    ) -> None:\n",
              "load task accepts validated draft path",
          )
          stale_start = manager.index("                        draft_model_path = None\n")
          loop_marker = "                        loop = asyncio.get_running_loop()\n"
          stale_end = manager.index(loop_marker, stale_start)
          manager = manager[:stale_start] + manager[stale_end:]
          print("PASS remove unvalidated draft resolution")
          manager = replace_once(
              manager,
              "        existing = self.load_tasks.get(model_id)\n        if existing and not existing.done():\n            return existing\n\n        device = device_check.normalize_device(device or self.settings.device)\n",
              "        existing = self.load_tasks.get(model_id)\n        if existing and not existing.done():\n            return existing\n\n        draft_model_path = self._resolve_draft_model_path(model_id, draft_model)\n        device = device_check.normalize_device(device or self.settings.device)\n",
              "validate draft before queueing",
          )
          manager = replace_once(
              manager,
              "        task = asyncio.create_task(self._load_task(model_id, device, draft_model=draft_model))\n",
              "        task = asyncio.create_task(\n            self._load_task(model_id, device, draft_model_path=draft_model_path)\n        )\n",
              "pass validated draft path",
          )
          manager = replace_once(
              manager,
              '            backend="openvino-genai",\n            model_path=f"models/openvino/{req.model_id}",\n',
              '            backend=getattr(req, "backend", "openvino-genai"),\n            model_path=f"models/openvino/{req.model_id}",\n',
              "preserve custom backend",
          )
          manager_path.write_text(manager, encoding="utf-8")

          engine_path = Path("runtime/openvino_engine.py")
          engine = engine_path.read_text(encoding="utf-8")
          engine = replace_once(
              engine,
              "import contextlib\nimport logging\n",
              "import contextlib\nimport hashlib\nimport logging\n",
              "import hashlib",
          )
          engine = replace_once(
              engine,
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import Any\n",
              "import Any",
          )
          engine = replace_once(
              engine,
              "            # Deterministic generation using a seed derived from the text hash\n            rng = random.Random(hash(text))\n",
              "            # Use a stable digest rather than Python's process-randomized hash().\n            seed = int.from_bytes(\n                hashlib.sha256(text.encode(\"utf-8\")).digest()[:8], \"big\"\n            )\n            rng = random.Random(seed)\n",
              "stable mock embedding seed",
          )
          draft_start = engine.index("        draft_obj = None\n")
          load_marker = '        logger.info("Loading \'%s\' on %s from %s", model_id, self.device, self.model_path)\n'
          draft_end = engine.index(load_marker, draft_start)
          draft_lines = [
              "        draft_obj = None",
              "        if draft_model_path:",
              '            logger.info("Initializing speculative decoding with draft model: %s", draft_model_path)',
              '            draft_model_fn = getattr(ov_genai, "draft_model", None)',
              "            if draft_model_fn is None:",
              "                raise RuntimeError(",
              '                    "This OpenVINO GenAI version does not support speculative decoding."',
              "                )",
              "            try:",
              "                draft_obj = draft_model_fn(str(draft_model_path), self.device)",
              "            except Exception as exc:",
              "                raise RuntimeError(",
              '                    f"Failed to load draft model \'{draft_model_path}\': {exc}"',
              "                ) from exc",
              "",
              load_marker.rstrip("\n"),
          ]
          engine = engine[:draft_start] + "\n".join(draft_lines) + "\n" + engine[draft_end + len(load_marker):]
          print("PASS speculative decoding initialization")
          engine = replace_once(
              engine,
              "                        so_cfg = StructuredOutputConfig()\n                        so_cfg.json_schema = json.dumps(schema_data)\n",
              "                        so_cfg = StructuredOutputConfig(\n                            json_schema=json.dumps(schema_data)\n                        )\n",
              "structured JSON schema config",
          )
          engine = replace_once(
              engine,
              "                    so_cfg = StructuredOutputConfig()\n                    so_cfg.json_schema = json.dumps({\"type\": \"object\"})\n",
              "                    so_cfg = StructuredOutputConfig(\n                        json_schema=json.dumps({\"type\": \"object\"})\n                    )\n",
              "structured JSON object config",
          )
          adapters_start = engine.index("    def _build_adapters_config(")
          generate_start = engine.index("    def generate(", adapters_start)
          adapter_lines = [
              "    def _build_adapters_config(self, params: GenParams):",
              "        if not params.lora_path:",
              "            return None",
              '        Adapter = getattr(self._ov, "Adapter", None)',
              '        AdapterConfig = getattr(self._ov, "AdapterConfig", None)',
              "        if Adapter is None or AdapterConfig is None:",
              "            raise RuntimeError(",
              '                "This OpenVINO GenAI version does not support dynamic LoRA adapters."',
              "            )",
              "        try:",
              "            adapters_config = AdapterConfig()",
              "            adapters_config.add(",
              "                Adapter(str(params.lora_path)),",
              "                alpha=float(params.lora_alpha or 1.0),",
              "            )",
              "            return adapters_config",
              "        except Exception as exc:",
              "            raise RuntimeError(",
              '                f"Failed to construct LoRA adapter config for \'{params.lora_path}\': {exc}"',
              "            ) from exc",
              "",
              "",
          ]
          engine = engine[:adapters_start] + "\n".join(adapter_lines) + engine[generate_start:]
          print("PASS fail loudly for unsupported LoRA")
          engine_path.write_text(engine, encoding="utf-8")
          PY
          PATCH_EXIT=$?
          echo "$PATCH_EXIT" > .repair-patch-exit
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate and publish report
        shell: bash
        env:
          OV_LLM_MOCK: "true"
        run: |
          set +e
          PATCH_EXIT=$(cat .repair-patch-exit)
          ruff check . --fix > lint-fix-output.txt 2>&1
          RUFF_FIX_EXIT=$?
          ruff format . > format-output.txt 2>&1
          FORMAT_EXIT=$?
          ruff check . > lint-output.txt 2>&1
          LINT_EXIT=$?
          ruff format --check . >> format-output.txt 2>&1
          FORMAT_CHECK_EXIT=$?
          pytest > test-output.txt 2>&1
          TEST_EXIT=$?
          {
            echo "# Recent feature repair validation"
            echo
            echo "- Patch exit: $PATCH_EXIT"
            echo "- Ruff fix exit: $RUFF_FIX_EXIT"
            echo "- Format exit: $FORMAT_EXIT"
            echo "- Format check exit: $FORMAT_CHECK_EXIT"
            echo "- Lint exit: $LINT_EXIT"
            echo "- Test exit: $TEST_EXIT"
            echo
            echo "## Patch output"
            echo '```text'
            cat repair-step-output.txt
            echo '```'
            echo
            echo "## Lint output"
            echo '```text'
            cat lint-output.txt
            echo '```'
            echo
            echo "## Test output"
            echo '```text'
            tail -n 400 test-output.txt
            echo '```'
          } > repair-validation-report.md
          echo "$TEST_EXIT" > .repair-test-exit
          exit 0

      - name: Publish repaired branch
        shell: bash
        run: |
          TEST_EXIT=$(cat .repair-test-exit)
          rm -f .repair-patch-exit .repair-test-exit repair-step-output.txt lint-fix-output.txt lint-output.txt format-output.txt test-output.txt
          git rm -f .github/workflows/repair-malformed-sections.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Restore and repair OpenVINO feature sections"
          git push origin HEAD:agent/recent-feature-fixes
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "Tests failed; see repair-validation-report.md"
          fi

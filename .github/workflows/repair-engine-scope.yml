name: Repair OpenVINO engine scope

on:
  push:
    branches: [agent/recent-feature-fixes]
    paths:
      - .github/workflows/repair-engine-scope.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recent-feature-fixes
          fetch-depth: 0
      - name: Restore clean engine
        run: |
          git fetch origin main
          git checkout origin/main -- runtime/openvino_engine.py
      - name: Apply scoped engine fixes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("runtime/openvino_engine.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "import contextlib\nimport logging\n",
              "import contextlib\nimport hashlib\nimport logging\n",
              1,
          )
          text = text.replace(
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import Any\n",
              1,
          )
          text = text.replace(
              "            # Deterministic generation using a seed derived from the text hash\n            rng = random.Random(hash(text))\n",
              "            # Use a stable digest rather than Python's process-randomized hash().\n            seed = int.from_bytes(\n                hashlib.sha256(text.encode(\"utf-8\")).digest()[:8], \"big\"\n            )\n            rng = random.Random(seed)\n",
              1,
          )

          class_start = text.index("class OpenVINOEngine(BaseEngine):")
          draft_start = text.index("        draft_obj = None\n", class_start)
          load_marker = '        logger.info("Loading \'%s\' on %s from %s", model_id, self.device, self.model_path)\n'
          draft_end = text.index(load_marker, draft_start)
          draft = "\n".join([
              "        draft_obj = None",
              "        if draft_model_path:",
              '            logger.info("Initializing speculative decoding with draft model: %s", draft_model_path)',
              '            draft_model_fn = getattr(ov_genai, "draft_model", None)',
              "            if draft_model_fn is None:",
              "                raise RuntimeError(",
              '                    "This OpenVINO GenAI version does not support speculative decoding."',
              "                )",
              "            try:",
              "                draft_obj = draft_model_fn(str(draft_model_path), self.device)",
              "            except Exception as exc:",
              "                raise RuntimeError(",
              '                    f"Failed to load draft model \'{draft_model_path}\': {exc}"',
              "                ) from exc",
              "",
              load_marker.rstrip("\n"),
          ]) + "\n"
          text = text[:draft_start] + draft + text[draft_end + len(load_marker):]

          text = text.replace(
              "                        so_cfg = StructuredOutputConfig()\n                        so_cfg.json_schema = json.dumps(schema_data)\n",
              "                        so_cfg = StructuredOutputConfig(\n                            json_schema=json.dumps(schema_data)\n                        )\n",
              1,
          )
          text = text.replace(
              "                    so_cfg = StructuredOutputConfig()\n                    so_cfg.json_schema = json.dumps({\"type\": \"object\"})\n",
              "                    so_cfg = StructuredOutputConfig(\n                        json_schema=json.dumps({\"type\": \"object\"})\n                    )\n",
              1,
          )

          adapter_start = text.index("    def _build_adapters_config(", class_start)
          generate_start = text.index("    def generate(", adapter_start)
          adapter = "\n".join([
              "    def _build_adapters_config(self, params: GenParams):",
              "        if not params.lora_path:",
              "            return None",
              '        Adapter = getattr(self._ov, "Adapter", None)',
              '        AdapterConfig = getattr(self._ov, "AdapterConfig", None)',
              "        if Adapter is None or AdapterConfig is None:",
              "            raise RuntimeError(",
              '                "This OpenVINO GenAI version does not support dynamic LoRA adapters."',
              "            )",
              "        try:",
              "            adapters_config = AdapterConfig()",
              "            adapters_config.add(",
              "                Adapter(str(params.lora_path)),",
              "                alpha=float(params.lora_alpha or 1.0),",
              "            )",
              "            return adapters_config",
              "        except Exception as exc:",
              "            raise RuntimeError(",
              '                f"Failed to construct LoRA adapter config for \'{params.lora_path}\': {exc}"',
              "            ) from exc",
              "",
              "",
          ])
          text = text[:adapter_start] + adapter + text[generate_start:]
          path.write_text(text, encoding="utf-8")
          PY
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Validate
        shell: bash
        env:
          OV_LLM_MOCK: "true"
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          set +e
          ruff check . --fix > lint-fix-output.txt 2>&1
          ruff format . > format-output.txt 2>&1
          ruff check . > lint-output.txt 2>&1
          LINT_EXIT=$?
          ruff format --check . >> format-output.txt 2>&1
          FORMAT_EXIT=$?
          pytest > test-output.txt 2>&1
          TEST_EXIT=$?
          {
            echo "# Recent feature repair validation"
            echo
            echo "- Format check exit: $FORMAT_EXIT"
            echo "- Lint exit: $LINT_EXIT"
            echo "- Test exit: $TEST_EXIT"
            echo
            echo "## Lint output"
            echo '```text'
            cat lint-output.txt
            echo '```'
            echo
            echo "## Test output"
            echo '```text'
            tail -n 400 test-output.txt
            echo '```'
          } > repair-validation-report.md
          echo "$TEST_EXIT" > .repair-test-exit
          exit 0
      - name: Publish branch
        shell: bash
        run: |
          TEST_EXIT=$(cat .repair-test-exit)
          rm -f .repair-test-exit lint-fix-output.txt lint-output.txt format-output.txt test-output.txt
          git rm -f .github/workflows/repair-engine-scope.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Repair OpenVINO engine feature scope"
          git push origin HEAD:agent/recent-feature-fixes
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "Tests failed; see repair-validation-report.md"
          fi

              "    stop: list[str] | None = None,\n    seed: int | None = None,\n    lora_path: str | None = None,\n",
              "    stop: list[str] | None = None,\n    seed: int | None = None,\n    response_format: dict | None = None,\n    lora_path: str | None = None,\n",
          )
          replace_once(
              "app/server.py",
              "        stop=stop or None,\n        seed=seed,\n        lora_path=lora_path,\n",
              "        stop=stop or None,\n        seed=seed,\n        response_format=response_format,\n        lora_path=lora_path,\n",
          )
          replace_once(
              "app/server.py",
              "    for k in valid_keys:\n        obfuscated = k[:5] + \"...\" if len(k) > 7 else k[:2] + \"...\"\n        key_stats[k] = {\n            \"key_name\": obfuscated,\n",
              "    for k in valid_keys:\n        prefix = k[:5] if len(k) > 7 else k[:2]\n        fingerprint = hashlib.sha256(k.encode(\"utf-8\")).hexdigest()[:8]\n        key_stats[k] = {\n            \"key_name\": f\"{prefix}...{fingerprint}\",\n",
          )
          replace_once(
              "app/server.py",
              "        task = manager.schedule_load(req.model, device, draft_model=req.draft_model)\n        entry = manager.catalog_entry(req.model)\n",
              "        try:\n            task = manager.schedule_load(req.model, device, draft_model=req.draft_model)\n        except ValueError as exc:\n            raise HTTPException(status_code=400, detail=str(exc)) from exc\n        entry = manager.catalog_entry(req.model)\n",
          )
          replace_once(

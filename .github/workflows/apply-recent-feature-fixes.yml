              "    group_size: int | None = Field(default=None, ge=-1)\n    ratio: float | None = Field(default=None, ge=0.0, le=1.0)\n    sym: bool | None = None\n    recommended_device: str = Field(default=\"CPU\", min_length=1, max_length=64)\n",
          )
          replace_once(
              "app/openai_api.py",
              "    description: str | None = None\n    load_after: bool = True\n",
              "    description: str | None = None\n    load_after: bool = True\n\n    @field_validator(\"recommended_device\")\n    @classmethod\n    def validate_recommended_device(cls, value: str) -> str:\n        try:\n            return device_check.validate_device_expression(value)\n        except device_check.DeviceValidationError as exc:\n            raise ValueError(str(exc)) from exc\n",
          )

          # app/model_registry.py: expose one canonical IR-directory check so draft
          # model validation and normal catalog validation cannot drift.
          replace_once(
              "app/model_registry.py",
              "def is_downloaded(cfg: ModelConfig, base_dir: Path) -> bool:\n    \"\"\"True if a converted OpenVINO IR directory exists for this model.\"\"\"\n    model_dir = cfg.abs_path(base_dir)\n    if not model_dir.is_dir():\n        return False\n    return any((model_dir / marker).exists() for marker in _IR_MARKERS)\n",
              "def is_openvino_model_dir(model_dir: Path) -> bool:\n    \"\"\"Return whether *model_dir* contains a converted OpenVINO IR model.\"\"\"\n    model_dir = Path(model_dir)\n    return model_dir.is_dir() and any((model_dir / marker).exists() for marker in _IR_MARKERS)\n\n\ndef is_downloaded(cfg: ModelConfig, base_dir: Path) -> bool:\n    \"\"\"True if a converted OpenVINO IR directory exists for this model.\"\"\"\n    return is_openvino_model_dir(cfg.abs_path(base_dir))\n",

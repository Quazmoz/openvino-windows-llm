              "    response_format: dict[str, Any] | None = None  # JSON object or JSON Schema constraint\n    lora_path: str | None = None  # path to safetensors LoRA weights\n    lora_alpha: float | None = Field(default=1.0, gt=0.0)  # scaling factor for LoRA weights\n",
          )
          replace_once(

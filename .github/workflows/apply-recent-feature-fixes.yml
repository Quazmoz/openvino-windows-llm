name: Apply recent feature fixes

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-recent-feature-fixes.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Apply focused fixes and regression coverage
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path


          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}: {old[:100]!r}")
              file_path.write_text(text.replace(old, new, 1), encoding="utf-8")


          # app/server.py: actually forward structured-output settings, validate draft
          # model requests synchronously, make API-key labels distinguishable, and record
          # non-streaming Responses API key metrics.
          replace_once(
              "app/server.py",
              "import contextvars\nimport json\n",
              "import contextvars\nimport hashlib\nimport json\n",

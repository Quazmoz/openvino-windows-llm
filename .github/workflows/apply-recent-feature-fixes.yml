              "def _resolve_from_catalog(model_id: str) -> tuple[str, Path, str]:\n    \"\"\"Look up source model, output dir, and weight format from models.json.\"\"\"\n",
              "def _resolve_from_catalog(model_id: str) -> tuple[str, Path, str, str | None]:\n    \"\"\"Look up source model, output dir, weight format, and Optimum task.\"\"\"\n",
          )
          replace_once(
              "runtime/model_converter.py",
              "    return cfg.source_model, cfg.abs_path(BASE_DIR), cfg.weight_format\n",
              "    task = \"feature-extraction\" if \"embedding\" in cfg.backend.lower() else None\n    return cfg.source_model, cfg.abs_path(BASE_DIR), cfg.weight_format, task\n",
          )
          replace_once(
              "runtime/model_converter.py",
              "    args = parser.parse_args(argv)\n\n    if args.id:\n        source_model, output_dir, weight_format = _resolve_from_catalog(args.id)\n        weight_format = args.weight_format or weight_format\n",
              "    args = parser.parse_args(argv)\n\n    if args.ratio is not None and not 0.0 <= args.ratio <= 1.0:\n        parser.error(\"--ratio must be between 0.0 and 1.0\")\n    if args.group_size is not None and args.group_size != -1 and args.group_size <= 0:\n        parser.error(\"--group-size must be -1 or a positive integer\")\n\n    task = args.task\n    if args.id:\n        source_model, output_dir, weight_format, catalog_task = _resolve_from_catalog(args.id)\n        weight_format = args.weight_format or weight_format\n        task = task or catalog_task\n",
          )
          replace_once(
              "runtime/model_converter.py",
              "            task=args.task,\n",
              "            task=task,\n",
          )

          # runtime/openvino_engine.py: avoid silently disabling requested features,
          # follow the current OpenVINO speculative-decoding device guidance, and
          # make mock embeddings reproducible across Python processes.
          replace_once(
              "runtime/openvino_engine.py",
              "import contextlib\nimport logging\n",
              "import contextlib\nimport hashlib\nimport logging\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import Any\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "            # Deterministic generation using a seed derived from the text hash\n            rng = random.Random(hash(text))\n",
              "            # Use a stable digest rather than Python's process-randomized hash().\n            seed = int.from_bytes(hashlib.sha256(text.encode(\"utf-8\")).digest()[:8], \"big\")\n            rng = random.Random(seed)\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "            draft_model_fn = getattr(ov_genai, \"draft_model\", None)\n            if draft_model_fn is not None:\n                draft_device = self.device\n                if self.device == \"NPU\":\n                    draft_device = \"CPU\"\n                try:\n                    draft_obj = draft_model_fn(str(draft_model_path), draft_device)\n                except Exception as exc:\n                    logger.error(\"Failed to load draft model: %s\", exc)\n            else:\n                logger.warning(\"openvino_genai.draft_model is not available in this OpenVINO version.\")\n",
              "            draft_model_fn = getattr(ov_genai, \"draft_model\", None)\n            if draft_model_fn is None:\n                raise RuntimeError(\n                    \"This OpenVINO GenAI version does not support speculative decoding.\"\n                )\n            try:\n                draft_obj = draft_model_fn(str(draft_model_path), self.device)\n            except Exception as exc:\n                raise RuntimeError(f\"Failed to load draft model '{draft_model_path}': {exc}\") from exc\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "                        so_cfg = StructuredOutputConfig()\n                        so_cfg.json_schema = json.dumps(schema_data)\n",
              "                        so_cfg = StructuredOutputConfig(json_schema=json.dumps(schema_data))\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "                    so_cfg = StructuredOutputConfig()\n                    so_cfg.json_schema = json.dumps({\"type\": \"object\"})\n",
              "                    so_cfg = StructuredOutputConfig(\n                        json_schema=json.dumps({\"type\": \"object\"})\n                    )\n",
          )
          replace_once(
              "runtime/openvino_engine.py",
              "        if Adapter is not None and AdapterConfig is not None:\n            try:\n                adapters_config = AdapterConfig()\n                adapters_config.add(Adapter(str(params.lora_path)), alpha=float(params.lora_alpha or 1.0))\n                return adapters_config\n            except Exception as exc:\n                logger.error(\"Failed to construct AdapterConfig for %s: %s\", params.lora_path, exc)\n        return None\n",
              "        if Adapter is None or AdapterConfig is None:\n            raise RuntimeError(\n                \"This OpenVINO GenAI version does not support dynamic LoRA adapters.\"\n            )\n        try:\n            adapters_config = AdapterConfig()\n            adapters_config.add(Adapter(str(params.lora_path)), alpha=float(params.lora_alpha or 1.0))\n            return adapters_config\n        except Exception as exc:\n            raise RuntimeError(\n                f\"Failed to construct LoRA adapter config for '{params.lora_path}': {exc}\"\n            ) from exc\n",
          )

          # Preserve the description entered in the custom-model UI.
          replace_once(
              "web/index.html",
              "                max_output_tokens: parseInt(customMaxOutputTokens.value, 10),\n                load_after: true\n",
              "                max_output_tokens: parseInt(customMaxOutputTokens.value, 10),\n                description: customDescription.value.trim() || null,\n                load_after: true\n",
          )

          # Repair mock-only tests that previously encoded invalid real-runtime behavior.
          replace_once(
              "tests/test_server_mock.py",
              '                "draft_model": "bge-small-en-v1.5",\n',
              '                "draft_model": "smollm2-135m-fp16",\n',
          )
          replace_once(
              "tests/test_server_mock.py",
              '        assert "bge-small-en-v1.5" in args[2]  # draft path contains model name\n',
              '        assert "smollm2-135m-fp16" in args[2]  # draft path contains model name\n',
          )
          replace_once(
              "tests/test_server_mock.py",
              '        assert "ke..." in names\n',

name: Apply final edge fixes

on:
  push:
    branches: [agent/final-browser-edge-hardening]
    paths:
      - .github/final-edge-fixes.patch
      - .github/workflows/apply-final-edge-fixes.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/final-browser-edge-hardening

      - name: Apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/final-edge-fixes.patch
          git apply .github/final-edge-fixes.patch
          rm .github/final-edge-fixes.patch
          rm .github/workflows/apply-final-edge-fixes.yml

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate final source
        env:
          OV_LLM_MOCK: "true"
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          ruff format --check .
          pytest
          python -m compileall -q app runtime scripts tests
          python - <<'PY'
          from pathlib import Path
          from app.ui_extension import VISION_EXTENSION_JS
          Path('/tmp/vision-extension.js').write_text(VISION_EXTENSION_JS, encoding='utf-8')
          PY
          node --check /tmp/vision-extension.js
          git diff --check

      - name: Commit verified fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/ui_extension.py tests/test_ui_extension.py .github
          git commit -m "Close final multimodal browser edge cases"
          git push origin HEAD:agent/final-browser-edge-hardening
